<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cooney Provisions Driver Portal</title>

<!-- ============================================================
     COONEY PROVISIONS - DRIVER PORTAL LANDING PAGE
     ============================================================
     Branded front door served at employee.cooneyprovisions.com
     (GitHub Pages). Solves two things at once:
       1. DEAD GOOGLE PAGE: a GoDaddy forward punts a logged-out
          user onto the Apps Script URL and mangles Google sign-in.
          A real landing page with a normal link lets sign-in run
          cleanly; signed-in users breeze straight through.
       2. HOME-SCREEN ICON: iOS reads the icon from the TOP-LEVEL
          page. The Apps Script portal is inside Google's iframe
          wrapper, so iOS never sees its icon. This real top-level
          page carries the custom icon correctly.

     ENTERING: one gold button. Already signed in -> portal instantly.
     Not signed in -> Google asks once, then portal. A static page
     cannot detect Google login state, so the button is the single
     clean entry for both (no fake auto-detect).

     TO CHANGE THE PORTAL IT OPENS: edit PORTAL_URL below.
     ASSETS expected alongside this file on Pages:
       apple-touch-icon-180.png, icon-192.png, icon-512.png, favicon.png
     ============================================================ -->

<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cooney">
<meta name="theme-color" content="#0B0908">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Barlow+Semi+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#0B0908; --coal:#15100C; --coal-edge:#2A2018;
    --ox:#5A1417; --ox-deep:#3A0D0F;
    --gold:#D9A53C; --gold-hi:#F3C75F; --gold-dim:#8A6A2A;
    --cream:#F4ECDD; --smoke:#B3A58F;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{
    background:radial-gradient(135% 60% at 50% -10%, #241712 0%, var(--ink) 58%), var(--ink);
    color:var(--cream);
    font-family:'Barlow Semi Condensed', system-ui, sans-serif;
    min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding:32px 24px calc(32px + env(safe-area-inset-bottom,0px));
    position:relative; overflow:hidden;
  }
  body::before{
    content:''; position:absolute; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(closest-side at 50% 38%, rgba(217,165,60,.10) 0%, rgba(217,165,60,0) 70%);
  }
  .wrap{ position:relative; z-index:1; width:100%; max-width:440px;
    display:flex; flex-direction:column; align-items:center; }
  .logo{ width:100%; max-width:360px; height:auto; object-fit:contain;
    filter:drop-shadow(0 6px 22px rgba(0,0,0,.6)); margin-bottom:26px; }
  .rule{ width:160px; height:1px; margin:0 auto 14px;
    background:linear-gradient(90deg, transparent, var(--gold-dim) 22%, var(--gold-hi) 50%, var(--gold-dim) 78%, transparent); }
  .eyebrow{ font-family:'Cinzel',serif; font-weight:600; font-size:12.5px;
    letter-spacing:.42em; text-indent:.42em; color:var(--gold); text-transform:uppercase; }
  .title{ font-family:'Cinzel',serif; font-weight:800; font-size:30px; line-height:1.12;
    letter-spacing:.02em; color:var(--cream); margin:18px 0 6px; text-shadow:0 2px 16px rgba(0,0,0,.5); }
  .title .accent{ color:var(--gold-hi); }
  .tagline{ font-size:15px; line-height:1.5; color:var(--smoke); max-width:330px; margin:0 auto; }
  .enter{ position:relative; margin-top:34px; width:100%; max-width:320px;
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    font-family:'Cinzel',serif; font-weight:700; font-size:16px;
    letter-spacing:.14em; text-indent:.14em; text-transform:uppercase;
    color:#2A1B06; cursor:pointer; text-decoration:none;
    padding:17px 24px; border:0; border-radius:14px;
    background:linear-gradient(180deg, var(--gold-hi) 0%, var(--gold) 52%, #B6862C 100%);
    box-shadow:0 10px 26px rgba(217,165,60,.30), inset 0 1px 0 rgba(255,255,255,.5);
    -webkit-appearance:none; transition:transform .08s ease, box-shadow .2s ease; }
  .enter:active{ transform:translateY(1px) scale(.995);
    box-shadow:0 6px 16px rgba(217,165,60,.28), inset 0 1px 0 rgba(255,255,255,.4); }
  .enter .chev{ font-size:19px; line-height:1; margin-top:-1px; }
  .note{ margin-top:18px; font-size:12.5px; color:var(--smoke); line-height:1.5; max-width:300px; }
  .enter.loading{ pointer-events:none; opacity:.9; }
  .enter.loading .lbl, .enter.loading .chev{ visibility:hidden; }
  .enter .spin{ display:none; width:20px; height:20px; position:absolute;
    border:2.5px solid rgba(42,27,6,.35); border-top-color:#2A1B06;
    border-radius:50%; animation:spin .7s linear infinite; }
  .enter.loading .spin{ display:block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .footer{ position:relative; z-index:1; margin-top:40px; font-family:'Cinzel',serif; letter-spacing:.16em; }
  .footer .est{ display:block; font-size:11px; font-weight:600; color:var(--gold); }
  .footer .addr{ margin-top:5px; font-family:'Barlow Semi Condensed',sans-serif;
    letter-spacing:.02em; font-size:11.5px; color:#6F6656; }
  @media (max-height:680px){
    .logo{ margin-bottom:18px; max-width:300px; }
    .title{ font-size:25px; }
    .enter{ margin-top:24px; }
    .footer{ margin-top:26px; }
  }
</style>
</head>
<body>

  <div class="wrap">
    <img class="logo"
         src="https://raw.githubusercontent.com/BCooney2026/cooney-sms/main/Logo.png"
         alt="Cooney Provisions">

    <div class="rule"></div>
    <div class="eyebrow">Driver Portal</div>

    <h1 class="title">Welcome to the <span class="accent">Crew</span></h1>
    <p class="tagline">Your routes, pull sheets, schedules, and more, all in one place.</p>

    <a class="enter" id="enterBtn" href="#" role="button" aria-label="Enter the Driver Portal">
      <span class="spin" aria-hidden="true"></span>
      <span class="lbl">Enter Portal</span>
      <span class="chev" aria-hidden="true">&#8250;</span>
    </a>

    <div class="note">Use your Cooney Provisions account. If you are not signed in, Google will ask you once.</div>
  </div>

  <div class="footer">
    <span class="est">EST. 1983</span>
    <span class="addr">3620 Schuylkill Road &middot; Spring City, PA 19475</span>
  </div>

<script>
  /* The real Apps Script Driver Portal this page enters. */
  var PORTAL_URL = 'https://script.google.com/a/macros/cooneyprovisions.com/s/AKfycby3N7ZZqdNUYTKkLOmhUplZ7ExgVoAPqd9K6cefHCAtpG5MS3-efOz0Mk4nrdVypIse_g/exec';

  var btn = document.getElementById('enterBtn');
  btn.setAttribute('href', PORTAL_URL);

  btn.addEventListener('click', function(ev){
    ev.preventDefault();
    btn.classList.add('loading');
    setTimeout(function(){ window.location.href = PORTAL_URL; }, 120);
  });
</script>

</body>
</html>
